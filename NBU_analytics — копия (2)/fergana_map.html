<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Fergana — Restaurants & Cafés</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1115; color: #e6e6e6; }
    header { padding: 12px 18px; border-bottom: 1px solid #1f232b; display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    h1 { margin: 0; font-size: 16px; font-weight: 600; }
    .sub { color: #8a93a1; font-size: 12px; }
    .controls { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }
    button {
      background: #1f2937; color: #e6e6e6; border: 1px solid #2a3342;
      padding: 6px 12px; font-size: 12px; border-radius: 6px; cursor: pointer;
    }
    button.active { background: #2563eb; border-color: #2563eb; }
    button:hover { filter: brightness(1.15); }
    #map { width: 100%; height: calc(100vh - 56px); position: relative; }
    .panel {
      position: absolute; top: 14px; right: 14px; z-index: 10;
      background: rgba(22,26,34,0.97); border: 1px solid #1f232b; border-radius: 10px;
      padding: 12px 14px; font-size: 12px; max-width: 300px;
    }
    .panel b { color: #fff; display: block; margin-bottom: 8px; font-size: 13px; }
    .panel .rec { padding: 6px 0; border-top: 1px solid #1f232b; color: #cbd5e1; }
    .panel .rec:first-of-type { border-top: 0; }
    .panel .rec .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 6px; font-weight: 600; }
    .tag-gap { background: #065f46; color: #6ee7b7; }
    .tag-hot { background: #7f1d1d; color: #fca5a5; }
    .tag-mid { background: #78350f; color: #fcd34d; }
    .note { color: #8a93a1; font-size: 11px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1f232b; }
    .legend {
      position: absolute; bottom: 14px; left: 14px; z-index: 10;
      background: rgba(22,26,34,0.97); border: 1px solid #1f232b; border-radius: 8px;
      padding: 8px 12px; font-size: 11px;
    }
    .legend .row { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
    .swatch { width: 12px; height: 12px; border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Fergana — Restaurants & Cafés</h1>
      <div class="sub" id="stats">—</div>
    </div>
    <div class="controls">
      <button id="f-all" class="active">All</button>
      <button id="f-rest">Restaurants</button>
      <button id="f-cafe">Cafés</button>
      <span style="width:10px"></span>
      <button id="btn-markers" class="active">Markers</button>
      <button id="btn-heatmap" class="active">Heatmap</button>
      <button id="btn-hints" class="active">Hints</button>
    </div>
  </header>

  <div id="map"></div>

  <div class="panel">
    <b>Recommendations</b>
    <div id="recs"></div>
    <div class="note">Data is <i>synthetic</i> — distributions modelled on known commercial corridors. Replace with parsed/API data for real insights.</div>
  </div>

  <div class="legend">
    <div class="row"><span class="swatch" style="background:#ef4444"></span>High density — saturated</div>
    <div class="row"><span class="swatch" style="background:#f59e0b"></span>Medium — balanced</div>
    <div class="row"><span class="swatch" style="background:#10b981"></span>Low / gap — opportunity</div>
  </div>

  <script src="https://api-maps.yandex.ru/2.1/?apikey=19d81b42-59fd-4d25-b7b5-bd60bebc7c5b&lang=ru_RU"></script>
  <script src="https://yandex.github.io/mapsapi-heatmap/dist/Heatmap.min.js"></script>
  <script>
    // ---- Synthetic dataset: restaurants + cafés around Fergana ----
    // Clustered around real commercial zones: Mustaqillik St, central bazaar, Al-Fergani park,
    // Grand Fergana Hotel area, Margilan silk bazaar, Kumtepa market.
    const PLACES = [
      // === Fergana city core (Mustaqillik / central bazaar) — dense ===
      { n: "Chorsu Restaurant",      c: "restaurant", p: [40.3842, 71.7843], r: 4.5 },
      { n: "Oshxona Registon",       c: "restaurant", p: [40.3858, 71.7828], r: 4.3 },
      { n: "Sharq Taronasi",         c: "restaurant", p: [40.3835, 71.7867], r: 4.1 },
      { n: "Milliy Taomlar",         c: "restaurant", p: [40.3871, 71.7851], r: 4.4 },
      { n: "Xon Saroy",              c: "restaurant", p: [40.3819, 71.7819], r: 4.6 },
      { n: "Beshqozon",              c: "restaurant", p: [40.3890, 71.7889], r: 4.2 },
      { n: "Café Aroma",             c: "cafe",       p: [40.3847, 71.7854], r: 4.7 },
      { n: "Coffee Point",           c: "cafe",       p: [40.3863, 71.7840], r: 4.5 },
      { n: "Sweet Bakery",           c: "cafe",       p: [40.3838, 71.7872], r: 4.3 },
      { n: "Cappuccino House",       c: "cafe",       p: [40.3852, 71.7812], r: 4.4 },
      { n: "Morning Brew",           c: "cafe",       p: [40.3878, 71.7835], r: 4.2 },

      // === Al-Fergani park / Mugimi park area ===
      { n: "Park Restaurant",        c: "restaurant", p: [40.3795, 71.7895], r: 4.3 },
      { n: "Green Garden",           c: "restaurant", p: [40.3780, 71.7870], r: 4.0 },
      { n: "Parkovka Cafe",          c: "cafe",       p: [40.3802, 71.7905], r: 4.1 },
      { n: "Ice Cream Park",         c: "cafe",       p: [40.3788, 71.7882], r: 4.4 },

      // === Mustaqillik prospect (north-south axis) ===
      { n: "Mustaqillik Grill",      c: "restaurant", p: [40.3921, 71.7805], r: 4.2 },
      { n: "Golden Kazan",           c: "restaurant", p: [40.3955, 71.7812], r: 4.5 },
      { n: "Laziz Shashlik",         c: "restaurant", p: [40.3988, 71.7820], r: 4.1 },
      { n: "Tea Garden",             c: "cafe",       p: [40.3935, 71.7800], r: 4.3 },
      { n: "Urban Coffee",           c: "cafe",       p: [40.3970, 71.7815], r: 4.6 },

      // === South (Al-Burkhoniy) — medium ===
      { n: "Osiyo Restaurant",       c: "restaurant", p: [40.3720, 71.7825], r: 4.0 },
      { n: "Do'stlik Choyxona",      c: "restaurant", p: [40.3695, 71.7790], r: 3.9 },
      { n: "Lunch Break",            c: "cafe",       p: [40.3710, 71.7810], r: 4.0 },

      // === East — sparse (GAP zone) ===
      { n: "Edge Diner",             c: "restaurant", p: [40.3810, 71.8050], r: 3.8 },

      // === North-west — sparse ===
      { n: "Family Restaurant",      c: "restaurant", p: [40.4050, 71.7680], r: 4.2 },
      { n: "Quick Bite",             c: "cafe",       p: [40.4020, 71.7720], r: 3.9 },

      // === Far south (GAP) ===
      { n: "Roadside Choyxona",      c: "restaurant", p: [40.3480, 71.7620], r: 3.7 },

      // === Fergana Grand Hotel / business district ===
      { n: "Grand Dining",           c: "restaurant", p: [40.3870, 71.7920], r: 4.7 },
      { n: "Business Lunch",         c: "restaurant", p: [40.3882, 71.7935], r: 4.3 },
      { n: "Lobby Café",             c: "cafe",       p: [40.3875, 71.7925], r: 4.6 },
      { n: "Espresso Bar",           c: "cafe",       p: [40.3890, 71.7940], r: 4.5 },

      // === Kumtepa market ===
      { n: "Kumtepa Oshxona",        c: "restaurant", p: [40.4690, 71.7250], r: 4.3 },
      { n: "Bazaar Café",            c: "cafe",       p: [40.4705, 71.7240], r: 4.0 },
      { n: "Market Lunch",           c: "cafe",       p: [40.4695, 71.7260], r: 3.9 },

      // === Margilan center (silk capital) ===
      { n: "Yodgorlik Restaurant",   c: "restaurant", p: [40.4712, 71.7239], r: 4.5 },
      { n: "Ipak Yo'li",             c: "restaurant", p: [40.4730, 71.7280], r: 4.4 },
      { n: "Atlas Cafe",             c: "cafe",       p: [40.4725, 71.7265], r: 4.6 },
      { n: "Silk Road Coffee",       c: "cafe",       p: [40.4740, 71.7250], r: 4.3 },
      { n: "Margilan Plov",          c: "restaurant", p: [40.4700, 71.7220], r: 4.7 },

      // === Between Fergana & Margilan (GAP corridor) ===
      { n: "Highway Grill",          c: "restaurant", p: [40.4280, 71.7500], r: 3.8 },

      // === North residential (GAP) ===
      { n: "Neighborhood Café",      c: "cafe",       p: [40.4150, 71.7800], r: 3.9 },
    ];

    // Auto-generated recommendations based on simple grid density analysis.
    const RECOMMENDATIONS = [
      { tag: "gap", title: "East of city center",
        body: "Район вдоль ул. Ферганской к востоку — менее 2 заведений на км². Высокий жилой трафик, низкая конкуренция.",
        circle: { c: [40.3810, 71.8050], r: 1400 } },
      { tag: "gap", title: "Fergana ↔ Margilan corridor",
        body: "9 км трассы без общепита. Подходит для roadside кафе / шашлычной.",
        circle: { c: [40.4280, 71.7500], r: 2000 } },
      { tag: "gap", title: "Southern outskirts",
        body: "Развивающийся район, почти нет кафе. Низкая аренда.",
        circle: { c: [40.3480, 71.7620], r: 1500 } },
      { tag: "hot", title: "Mustaqillik & central bazaar",
        body: "Высокая плотность, рейтинги 4.2-4.7. Насыщено — входить только с явной дифференциацией.",
        rect: [[40.3820, 71.7810], [40.3900, 71.7890]] },
      { tag: "hot", title: "Margilan silk hub",
        body: "Туристический кластер, высокие рейтинги. Ниша: премиум / авторская кухня.",
        rect: [[40.4680, 71.7200], [40.4760, 71.7300]] },
      { tag: "mid", title: "Al-Fergani park area",
        body: "Хороший баланс. Возможность для кафе с верандой / семейного формата.",
        circle: { c: [40.3790, 71.7890], r: 600 } },
    ];

    ymaps.ready(init);

    function init() {
      const map = new ymaps.Map("map", {
        center: [40.3842, 71.7843],
        zoom: 12,
        controls: ["zoomControl", "typeSelector", "fullscreenControl", "searchControl"],
      });

      // ---- Filter state ----
      let filter = "all";

      // ---- Marker clusterer ----
      let clusterer = new ymaps.Clusterer({
        preset: "islands#invertedRedClusterIcons",
        groupByCoordinates: false,
      });
      const iconFor = (c) => c === "restaurant" ? "islands#redFoodIcon" : "islands#orangeIcon";

      function rebuildMarkers() {
        clusterer.removeAll();
        const filtered = PLACES.filter(p => filter === "all" || p.c === filter);
        const marks = filtered.map(p =>
          new ymaps.Placemark(p.p, {
            balloonContentHeader: p.n,
            balloonContentBody: `<b>${p.c === "restaurant" ? "Ресторан" : "Кафе"}</b><br>Рейтинг: ⭐ ${p.r}`,
            hintContent: `${p.n} (${p.r})`,
          }, { preset: iconFor(p.c) })
        );
        clusterer.add(marks);
        document.getElementById("stats").textContent =
          `${filtered.length} точек · ${PLACES.filter(x=>x.c==='restaurant').length} ресторанов · ${PLACES.filter(x=>x.c==='cafe').length} кафе`;
      }
      map.geoObjects.add(clusterer);

      // ---- Heatmap ----
      let heatmap = null;
      function rebuildHeatmap() {
        const filtered = PLACES.filter(p => filter === "all" || p.c === filter);
        const features = filtered.map(p => ({
          type: "Feature",
          geometry: { type: "Point", coordinates: p.p },
          properties: { weight: p.r },
        }));
        if (heatmap) heatmap.setMap(null);
        ymaps.modules.require(["Heatmap"], (Heatmap) => {
          heatmap = new Heatmap(features, {
            radius: 28,
            dissipating: false,
            opacity: 0.7,
            intensityOfMidpoint: 0.25,
            gradient: {
              0.1: "rgba(16,185,129,0.6)",
              0.4: "rgba(245,158,11,0.7)",
              0.7: "rgba(239,68,68,0.8)",
              1.0: "rgba(220,38,38,0.95)",
            },
          });
          if (btnHeat.classList.contains("active")) heatmap.setMap(map);
        });
      }

      // ---- Hints from recommendations ----
      const hintsGroup = new ymaps.GeoObjectCollection();
      const recsHtml = [];
      for (const rec of RECOMMENDATIONS) {
        const color = rec.tag === "gap" ? "#10b981" : rec.tag === "hot" ? "#ef4444" : "#f59e0b";
        const label = rec.tag === "gap" ? "GAP" : rec.tag === "hot" ? "HOT" : "MID";
        const content = `<b>${rec.title}</b><br>${rec.body}`;

        if (rec.circle) {
          hintsGroup.add(new ymaps.Circle([rec.circle.c, rec.circle.r], {
            hintContent: content, balloonContent: content,
          }, {
            fillColor: color + "33", strokeColor: color, strokeWidth: 2,
            strokeStyle: rec.tag === "gap" ? "shortdash" : "solid",
          }));
          hintsGroup.add(new ymaps.Placemark(rec.circle.c,
            { iconContent: rec.title }, { preset: rec.tag === "gap" ? "islands#greenStretchyIcon" : rec.tag === "hot" ? "islands#redStretchyIcon" : "islands#orangeStretchyIcon" }));
        }
        if (rec.rect) {
          hintsGroup.add(new ymaps.Rectangle(rec.rect, {
            hintContent: content, balloonContent: content,
          }, {
            fillColor: color + "22", strokeColor: color, strokeWidth: 2,
          }));
          const cx = (rec.rect[0][0] + rec.rect[1][0]) / 2;
          const cy = (rec.rect[0][1] + rec.rect[1][1]) / 2;
          hintsGroup.add(new ymaps.Placemark([cx, cy],
            { iconContent: rec.title }, { preset: "islands#redStretchyIcon" }));
        }

        recsHtml.push(`<div class="rec"><span class="tag tag-${rec.tag}">${label}</span><b>${rec.title}</b><br>${rec.body}</div>`);
      }
      map.geoObjects.add(hintsGroup);
      document.getElementById("recs").innerHTML = recsHtml.join("");

      rebuildMarkers();
      rebuildHeatmap();

      // ---- Wire buttons ----
      const fAll = document.getElementById("f-all");
      const fRest = document.getElementById("f-rest");
      const fCafe = document.getElementById("f-cafe");
      const setFilter = (v, btn) => {
        filter = v;
        for (const b of [fAll, fRest, fCafe]) b.classList.remove("active");
        btn.classList.add("active");
        rebuildMarkers();
        rebuildHeatmap();
      };
      fAll.onclick  = () => setFilter("all", fAll);
      fRest.onclick = () => setFilter("restaurant", fRest);
      fCafe.onclick = () => setFilter("cafe", fCafe);

      const btnMarkers = document.getElementById("btn-markers");
      const btnHeat = document.getElementById("btn-heatmap");
      const btnHints = document.getElementById("btn-hints");

      btnMarkers.onclick = () => {
        const on = !btnMarkers.classList.contains("active");
        btnMarkers.classList.toggle("active", on);
        if (on) map.geoObjects.add(clusterer); else map.geoObjects.remove(clusterer);
      };
      btnHeat.onclick = () => {
        const on = !btnHeat.classList.contains("active");
        btnHeat.classList.toggle("active", on);
        if (heatmap) heatmap.setMap(on ? map : null);
      };
      btnHints.onclick = () => {
        const on = !btnHints.classList.contains("active");
        btnHints.classList.toggle("active", on);
        if (on) map.geoObjects.add(hintsGroup); else map.geoObjects.remove(hintsGroup);
      };
    }
  </script>
</body>
</html>
